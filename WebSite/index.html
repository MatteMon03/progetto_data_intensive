<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Previsione Traffico</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h2 style="text-align: center; margin-top: 0; color: #1e293b;">Previsione Traffico</h2>
        
        <label>Incrocio (Junction 1-4):</label>
        <input type="number" id="val_junction" value="1" min="1" max="4">

        <label>Anno (Year):</label>
        <input type="number" id="val_year" value="2017">

        <label>Ora (Hour 0-23):</label>
        <input type="number" id="val_hour" value="14" min="0" max="23">

        <label>Giorno Settimana (0=Lun, 6=Dom):</label>
        <input type="number" id="val_day" value="2" min="0" max="6">

        <button onclick="faiPrevisione()">Calcola Traffico</button>
        
        <h3 id="risultato"></h3>
    </div>

    <script src="script.js"></script>
</body>
</html>
